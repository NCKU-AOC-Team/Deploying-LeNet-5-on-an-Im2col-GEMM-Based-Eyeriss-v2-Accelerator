<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1240" height="932" viewBox="0 0 1240 932">
  <style>
    text { font-family: 'Noto Sans TC','Noto Sans CJK TC','Microsoft JhengHei','PingFang TC','WenQuanYi Zen Hei',sans-serif; }
    .h1    { font-size: 19px; font-weight: bold; fill: #111; text-anchor: middle; }
    .h2    { font-size: 13px; fill: #555; text-anchor: middle; }
    .bnd   { font-size: 12px; fill: #999; text-anchor: middle; }
    .box   { fill: #e9eef8; stroke: #3a557e; stroke-width: 1.6; }
    .boxlb { font-size: 16px; font-weight: bold; fill: #1d2c45; text-anchor: middle; }
    .sub   { font-size: 11px; fill: #41587c; text-anchor: middle; }
    .ctrl  { fill: #f3eef8; stroke: #6b4a86; stroke-width: 1.6; }
    .ctrllb{ font-size: 16px; font-weight: bold; fill: #3d2754; text-anchor: middle; }
    .ctrlt { font-size: 11px; fill: #4a3a5c; text-anchor: middle; }
    .port  { fill: #fbfbfc; stroke: #c8c8d2; stroke-width: 1.2; }
    .ptt   { font-size: 12px; font-weight: bold; text-anchor: middle; }
    .ptl   { font-size: 10.5px; fill: #555; text-anchor: middle; }
    .lbl   { font-size: 11px; text-anchor: middle; }
    .gray  { font-size: 10.5px; fill: #888; text-anchor: middle; }
    .note  { font-size: 11.5px; fill: #555; }
    .cross { font-size: 11px; font-weight: bold; fill: #d62728; text-anchor: middle; }
    .aB { stroke: #1f77b4; stroke-width: 2.2; fill: none; }
    .aG { stroke: #2ca02c; stroke-width: 2.2; fill: none; }
    .aR { stroke: #d62728; stroke-width: 2.2; fill: none; }
    .aO { stroke: #e07b00; stroke-width: 2.2; fill: none; }
    .aY { stroke: #888888; stroke-width: 2.0; fill: none; }
    .dsh{ stroke: #b0b0b0; stroke-width: 1.8; fill: none; stroke-dasharray: 6 5; }
  </style>
  <defs>
    <marker id="mB" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#1f77b4"/></marker>
    <marker id="mG" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2ca02c"/></marker>
    <marker id="mR" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#d62728"/></marker>
    <marker id="mO" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#e07b00"/></marker>
    <marker id="mY" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#888888"/></marker>
  </defs>

  <rect x="0" y="0" width="1240" height="932" fill="#ffffff"/>
  <text class="h1" x="620" y="30">Cluster_Group.v — ClusterGroup 內四子模組互連 ＆ 與 top port 接線</text>
  <text class="h2" x="620" y="54">資料面：GLB ⇄ Router ⇄ PE（Router 為資料樞紐）　│　控制面：Cluster_Group_Controller 主導 PE＋GLB（不連 Router）</text>
  <text class="bnd" x="620" y="76">虛線框＝ClusterGroup module 邊界；框內頂部／底部標籤群＝對應的 top port</text>

  <!-- module boundary -->
  <rect x="30" y="86" width="1190" height="730" rx="12" fill="#fdfdfe" stroke="#b0b0b0" stroke-width="1.6" stroke-dasharray="7 5"/>

  <!-- ===================== top-port clusters ===================== -->
  <!-- A: above GLB -->
  <rect class="port" x="95" y="104" width="250" height="74" rx="7"/>
  <text class="ptt" x="220" y="123" fill="#555">top — GLB 外部 I/O</text>
  <text class="ptl" x="220" y="141">iact / weight 載入 ＋ read/write addr</text>
  <text class="ptl" x="220" y="157">GLB_psum_n_* readout</text>
  <text class="ptl" x="220" y="171">(per-bank 純量, 經 glue)</text>
  <!-- B: above Router -->
  <rect class="port" x="475" y="104" width="310" height="74" rx="7"/>
  <text class="ptt" x="630" y="123" fill="#555">top — tile-chain（與鄰 CG 互連）</text>
  <text class="ptl" x="630" y="141">iact_{north,south,horiz}_* ・ weight_horiz_*</text>
  <text class="ptl" x="630" y="159">psum_north_in / psum_south_out</text>
  <!-- C: above PE -->
  <rect class="port" x="905" y="104" width="290" height="74" rx="7"/>
  <text class="ptt" x="1050" y="123" fill="#555">top — 垂直 psum ・ PE 控制</text>
  <text class="ptl" x="1050" y="141">cg_south_psum_in → .psum_in_from_south</text>
  <text class="ptl" x="1050" y="159">cg_north_psum_out ← PE (glue)</text>
  <text class="ptl" x="1050" y="173">PE_disable ・ *_sel ・ *_clear</text>

  <!-- ===================== data-plane boxes ===================== -->
  <rect class="box" x="110" y="300" width="210" height="180" rx="8"/>
  <text class="boxlb" x="215" y="332">GLB_Cluster</text>
  <text class="sub"   x="215" y="356">9 iact SRAM Bank</text>
  <text class="sub"   x="215" y="372">3 psum SRAM Bank</text>
  <text class="sub"   x="215" y="396">（iact/weight 由 top 載入，</text>
  <text class="sub"   x="215" y="411">  讀出餵 Router）</text>

  <rect class="box" x="525" y="290" width="210" height="215" rx="8"/>
  <text class="boxlb" x="630" y="320">Router_Cluster</text>
  <text class="sub"   x="630" y="344">純組合繞徑</text>
  <text class="sub"   x="630" y="360">（無 clock / reset）</text>
  <text class="sub"   x="630" y="382">iact router ×9</text>
  <text class="sub"   x="630" y="398">weight router ×3</text>
  <text class="sub"   x="630" y="414">psum router ×3</text>
  <text class="sub"   x="630" y="438">繞徑由 router_cluster_*_sel 設定</text>

  <rect class="box" x="960" y="300" width="200" height="180" rx="8"/>
  <text class="boxlb" x="1060" y="332">PE_Cluster</text>
  <text class="sub"   x="1060" y="356">3×3 = 9 PE</text>
  <text class="sub"   x="1060" y="372">psum scratchpad 累加</text>
  <text class="cross" x="1060" y="398">★ 埠名交叉（CSC）</text>
  <text class="sub"   x="1060" y="413" fill="#d62728">iact 口收 weight・weight 口收 iact</text>

  <!-- ===================== cluster -> box feeds ===================== -->
  <!-- A -> GLB -->
  <line class="aB" x1="170" y1="178" x2="170" y2="298" marker-end="url(#mB)"/>
  <line class="aG" x1="205" y1="178" x2="205" y2="298" marker-end="url(#mG)"/>
  <line class="aO" x1="280" y1="298" x2="280" y2="178" marker-end="url(#mO)"/>
  <text class="gray" x="300" y="245">psum readout ↕</text>
  <!-- B -> Router (tile-chain, 雙向) -->
  <line class="aB" x1="600" y1="178" x2="600" y2="288" marker-end="url(#mB)"/>
  <line class="aG" x1="630" y1="178" x2="630" y2="288" marker-end="url(#mG)"/>
  <line class="aR" x1="660" y1="178" x2="660" y2="288" marker-end="url(#mR)"/>
  <text class="gray" x="630" y="270">↕ 雙向</text>
  <!-- C -> PE -->
  <line class="aO" x1="1000" y1="178" x2="1000" y2="298" marker-end="url(#mO)"/>
  <line class="aO" x1="1055" y1="298" x2="1055" y2="178" marker-end="url(#mO)"/>
  <line class="aY" x1="1110" y1="178" x2="1110" y2="298" marker-end="url(#mY)"/>
  <text class="gray" x="995"  y="250" text-anchor="end">south↓</text>
  <text class="gray" x="1075" y="250">north↑</text>

  <!-- ===================== GLB <-> Router corridor ===================== -->
  <line class="aB" x1="320" y1="330" x2="525" y2="330" marker-end="url(#mB)"/>
  <text class="lbl" x="422" y="324" fill="#1f77b4">iact_GLB</text>
  <line class="aG" x1="320" y1="362" x2="525" y2="362" marker-end="url(#mG)"/>
  <text class="lbl" x="422" y="356" fill="#2ca02c">weight_GLB</text>
  <line class="aR" x1="525" y1="432" x2="320" y2="432" marker-end="url(#mR)"/>
  <text class="lbl" x="422" y="426" fill="#d62728">psum_GLB_out</text>
  <text class="gray" x="422" y="446">(glue 存)</text>
  <line class="aR" x1="320" y1="466" x2="525" y2="466" marker-end="url(#mR)"/>
  <text class="gray" x="422" y="480">psum_GLB_in (glue 讀回・＆psum_add)</text>

  <!-- ===================== Router <-> PE corridor ===================== -->
  <line class="aB" x1="735" y1="328" x2="960" y2="328" marker-end="url(#mB)"/>
  <text class="lbl" x="847" y="322" fill="#1f77b4">iact_PE ⟶ PE.weight 口</text>
  <line class="aG" x1="735" y1="360" x2="960" y2="360" marker-end="url(#mG)"/>
  <text class="lbl" x="847" y="354" fill="#2ca02c">weight_PE ⟶ PE.iact 口</text>
  <line class="aR" x1="735" y1="432" x2="960" y2="432" marker-end="url(#mR)"/>
  <text class="lbl" x="847" y="426" fill="#d62728">psum_PE_out (回灌累加)</text>
  <line class="aR" x1="960" y1="466" x2="735" y2="466" marker-end="url(#mR)"/>
  <text class="gray" x="847" y="480">psum_PE_in (PE 算完送出)</text>

  <!-- ===================== Controller ===================== -->
  <rect class="ctrl" x="110" y="648" width="1050" height="100" rx="8"/>
  <text class="ctrllb" x="635" y="676">Cluster_Group_Controller　（時序控制核心；不連 Router）</text>
  <text class="ctrlt"  x="635" y="702">in : clk/rst ・ cg_en ・ src_GLB_load_fin ・ psum_acc_en/fin ・ read_psum_en ・ GLB write/read_done(9＋3) ・ PE all_write_fin</text>
  <text class="ctrlt"  x="635" y="722">out: GLB iact/psum write_en・read_en　│　PE load_en・psum_load_en　│　psum_add　│　top: cal_fin・GLB_iact_load_en・idle_wire</text>

  <!-- Controller <-> GLB -->
  <line class="aY" x1="200" y1="648" x2="200" y2="482" marker-end="url(#mY)"/>
  <line class="aY" x1="245" y1="482" x2="245" y2="648" marker-end="url(#mY)"/>
  <text class="gray" x="222" y="556">en ↑</text>
  <text class="gray" x="222" y="572">done ↓</text>
  <!-- Controller <-> PE -->
  <line class="aY" x1="1015" y1="648" x2="1015" y2="482" marker-end="url(#mY)"/>
  <line class="aY" x1="1060" y1="482" x2="1060" y2="648" marker-end="url(#mY)"/>
  <text class="gray" x="1037" y="556">load_en ↑</text>
  <text class="gray" x="1037" y="572">all_write_fin ↓</text>
  <!-- Controller X Router -->
  <line class="dsh" x1="635" y1="648" x2="635" y2="512"/>
  <text class="cross" x="635" y="588">✗</text>
  <text class="gray"  x="635" y="606">不連 Router</text>

  <!-- all_cal_fin note (placed in the clear Router–PE gap to avoid the ctrl arrows) -->
  <text class="gray" x="847" y="520">all_cal_fin(top) ← reg ← PE.all_cal_fin</text>

  <!-- ===================== legend ===================== -->
  <line class="aB" x1="55"  y1="840" x2="95"  y2="840"/><text class="note" x="100" y="844">iact</text>
  <line class="aG" x1="165" y1="840" x2="205" y2="840"/><text class="note" x="210" y="844">weight</text>
  <line class="aR" x1="300" y1="840" x2="340" y2="840"/><text class="note" x="345" y="844">psum（PE/Router/GLB 資料）</text>
  <line class="aO" x1="585" y1="840" x2="625" y2="840"/><text class="note" x="630" y="844">cg psum（垂直跨 CG）</text>
  <line class="aY" x1="820" y1="840" x2="860" y2="840"/><text class="note" x="865" y="844">控制 / tie</text>
  <line class="dsh" x1="985" y1="840" x2="1025" y2="840"/><text class="note" x="1030" y="844">無接線</text>

  <!-- ===================== bottom notes ===================== -->
  <text class="note" x="40" y="878">★ PE 埠名交叉（CSC 命名）：PE 的 iact 口實接 weight router 輸出、weight 口實接 iact router 輸出　│　Router 純組合，繞徑由 top 的 router_cluster_*_sel 決定，不歸 Controller 管。</text>
  <text class="note" x="40" y="900">glue＝模組外 assign 層：psum 存/讀回的 ＆psum_add・＆sel 閘控、GLB_psum_n 與 read_out_en 的 per-bank 攤平、iact PE-ready 1→3 廣播、cg_north_psum_out 匯出。</text>
  <text class="note" x="40" y="920">clock/reset → PE・GLB・Controller（Router 無）　│　PSUM_DEPTH → PE ＆ GLB 同時　│　all_cal_fin 經 CG_array 4-CG AND 成 gloabl_cal_fin 後回灌 psum_acc_en。</text>
</svg>
